<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | Access Restricted</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b; --bg-card: #18181b; --border: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --danger: #ef4444; --danger-glow: rgba(239, 68, 68, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background-image: radial-gradient(circle at center, var(--danger-glow) 0%, transparent 50%); }
        body::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; pointer-events: none; }
        
        .container { width: 100%; max-width: 500px; padding: 20px; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .icon-wrapper { width: 56px; height: 56px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; box-shadow: 0 0 30px var(--danger-glow); animation: pulse 2s infinite; }
        
        .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 16px; margin-left: auto; margin-right: auto; }
        .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        .header { text-align: center; margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;}
        .header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.05em; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }
        
        .terminal { background: #0f0f11; border: 1px solid var(--border); border-left: 3px solid var(--danger); border-radius: 10px; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .term-head { display: flex; gap: 6px; margin-bottom: 16px; }
        .term-dot { width: 10px; height: 10px; border-radius: 50%; background: #3f3f46; }
        
        .log-line { display: flex; gap: 10px; margin-bottom: 8px; color: var(--text-muted); }
        .log-line .time { color: #52525b; }
        .log-line .tag { color: var(--danger); font-weight: 600; }
        .log-line.focus { color: var(--text-main); }
        .log-line.focus .tag { color: #8b5cf6; }
        
        .sys-info { margin-top: 20px; padding-top: 12px; border-top: 1px dashed var(--border); font-size: 0.65rem; color: #52525b; display: flex; justify-content: space-between; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge"><span class="dot"></span> ERROR 403</div>
        <div class="icon-wrapper">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>Access Restricted</h1>
        <p>This endpoint is protected. Script loader can only be accessed via HTTP requests from an authorized Roblox client.</p>
    </div>

    <div class="terminal">
        <div class="term-head"><div class="term-dot"></div><div class="term-dot"></div><div class="term-dot"></div></div>
        
        <div class="log-line"><span class="time" id="t1"></span><span class="tag">[WARN]</span><span>Invalid User-Agent detected.</span></div>
        <div class="log-line focus"><span class="time" id="t2"></span><span class="tag">[DENY]</span><span>Connection blocked by server firewall.</span></div>
        <div class="log-line"><span class="time" id="t3"></span><span class="tag">[INFO]</span><span>Incident reported to administrator.</span></div>

        <div class="sys-info"><span>SYS::RBX.LOADER</span><span id="ip-trace">IP: TRACING...</span></div>
    </div>
</div>

<script>
    function setTime() {
        const timeStr = new Date().toISOString().split('T')[1].slice(0, 8);
        document.getElementById('t1').innerText = timeStr;
        document.getElementById('t2').innerText = timeStr;
        document.getElementById('t3').innerText = timeStr;
    }
    setTime();
    setTimeout(() => {
        const fakeIp = `${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.*.*`;
        document.getElementById('ip-trace').innerText = `IP: ${fakeIp}`;
    }, 1500);
</script>
</body>
</html>
